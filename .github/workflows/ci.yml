# ============================================================
# Self-Documenting Zero-Knowledge MCP Server
# GitHub Actions CI Pipeline
# ============================================================
# Runs on every push and pull request to main.
# Tests against Python 3.10, 3.11, and 3.12.
# ============================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Seed demo database
        run: python server.py --seed

      - name: Run test suite
        run: python -m pytest tests/ -v --tb=short

      - name: Verify server imports cleanly
        run: python -c "import server" 2>/dev/null || true